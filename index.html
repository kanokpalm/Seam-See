<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เสี่ยงเซียมซี สุ่มรางวัล</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { margin:0; padding:0; background:#160000; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    const CSS = `
      * { box-sizing: border-box; margin: 0; padding: 0; }

      @keyframes shake {
        0%,100% { transform: rotate(0deg) translate(0,0); }
        10% { transform: rotate(-6deg) translate(-10px,2px); }
        20% { transform: rotate(6deg)  translate(10px,-2px); }
        30% { transform: rotate(-5deg) translate(-8px,1px); }
        40% { transform: rotate(5deg)  translate(8px,-1px); }
        50% { transform: rotate(-8deg) translate(-13px,3px); }
        60% { transform: rotate(8deg)  translate(13px,-3px); }
        70% { transform: rotate(-4deg) translate(-6px,1px); }
        80% { transform: rotate(4deg)  translate(6px,-1px); }
        90% { transform: rotate(-2deg) translate(-3px,0); }
      }
      @keyframes stickOut {
        0%   { transform: translateY(-130px) rotate(90deg); opacity: 0; }
        22%  { opacity: 1; }
        54%  { transform: translateY(6px) rotate(90deg); }
        66%  { transform: translateY(0px) rotate(90deg); }
        84%  { transform: translateY(0px) rotate(6deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      @keyframes resReveal {
        0%   { transform: scale(0.55) translateY(12px); opacity: 0; }
        72%  { transform: scale(1.06) translateY(-3px); }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes goldGlow {
        0%,100% { text-shadow: 0 0 8px rgba(212,175,55,.4); }
        50%  { text-shadow: 0 0 28px rgba(212,175,55,.9), 0 0 56px rgba(212,175,55,.35); }
      }
      @keyframes waitDot {
        0%,100% { opacity:.3; }
        50% { opacity:1; }
      }
      @keyframes floatIn {
        from { opacity:0; transform:translateY(-6px); }
        to   { opacity:1; transform:translateY(0); }
      }

      .shaking    { animation: shake 1.05s ease-in-out; }
      .stick-out  { animation: stickOut .72s cubic-bezier(.34,1.56,.64,1) forwards; }
      .res-reveal { animation: resReveal .45s ease-out forwards; }
      .gold-glow  { animation: goldGlow 2.8s ease-in-out infinite; }
      .wait-dot   { animation: waitDot 1.1s ease-in-out infinite; }
      .float-in   { animation: floatIn .3s ease-out; }

      ::-webkit-scrollbar { width:5px; }
      ::-webkit-scrollbar-track { background:rgba(0,0,0,.25); }
      ::-webkit-scrollbar-thumb { background:rgba(212,175,55,.35); border-radius:3px; }

      .inp {
        background:rgba(0,0,0,.45);
        border:1px solid rgba(212,175,55,.32);
        color:#FFE4B5;
        padding:9px 13px;
        border-radius:8px;
        font-size:14px;
        font-family:inherit;
        width:100%;
        transition:border-color .2s;
        outline:none;
      }
      .inp:focus { border-color:rgba(212,175,55,.75); }

      .btn-main {
        background:linear-gradient(145deg,#B82030,#8B0000);
        border:2px solid #D4AF37;
        color:#FFD700;
        font-size:17px;
        font-weight:700;
        letter-spacing:3px;
        padding:13px 38px;
        border-radius:10px;
        cursor:pointer;
        transition:transform .14s, box-shadow .14s;
        box-shadow:0 4px 20px rgba(0,0,0,.55), 0 0 0 1px rgba(212,175,55,.18);
        font-family:inherit;
      }
      .btn-main:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 26px rgba(0,0,0,.55),0 0 18px rgba(212,175,55,.22); }
      .btn-main:active:not(:disabled) { transform:translateY(0); }
      .btn-main:disabled { opacity:.38; cursor:not-allowed; }

      .btn-sub {
        background:rgba(110,15,15,.38);
        border:1.5px solid rgba(212,175,55,.44);
        color:#D4AF37;
        font-size:14px;
        letter-spacing:1px;
        padding:11px 22px;
        border-radius:9px;
        cursor:pointer;
        transition:background .15s;
        font-family:inherit;
      }
      .btn-sub:hover { background:rgba(130,20,20,.55); }

      .btn-mini {
        background:transparent;
        border:1px solid rgba(212,175,55,.28);
        color:rgba(212,175,55,.68);
        font-size:12px;
        padding:4px 12px;
        border-radius:6px;
        cursor:pointer;
        font-family:inherit;
        transition:background .12s;
      }
      .btn-mini:hover { background:rgba(212,175,55,.1); }

      .tab-btn {
        padding:10px 26px;
        background:transparent;
        border:none;
        color:rgba(212,175,55,.5);
        font-size:14px;
        cursor:pointer;
        font-family:inherit;
        transition:all .2s;
        letter-spacing:1px;
      }
      .tab-btn.on {
        background:linear-gradient(145deg,#6B0010,#9B1020);
        color:#FFD700;
        font-weight:700;
      }

      .chip {
        display:inline-flex; align-items:center; gap:5px;
        background:rgba(70,0,10,.65);
        border:1px solid rgba(212,175,55,.2);
        color:#FFE4B5;
        font-size:12px;
        padding:4px 10px;
        border-radius:20px;
        margin:3px;
      }
      .chip-x {
        background:none; border:none;
        color:rgba(212,175,55,.52); cursor:pointer;
        font-size:16px; line-height:1;
        padding:0 0 1px 1px; transition:color .1s;
      }
      .chip-x:hover { color:#D4AF37; }

      .cyl-wrap { transition: filter .45s ease, opacity .45s ease; }
      .cyl-wrap.blurred { filter: blur(3px); opacity: .45; }

      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { opacity:1; }
    `;

    function CiamSiContainer({ isShaking, stickCount }) {
      const n = Math.max(0, Math.min(stickCount, 20));
      return (
        <div className={isShaking ? "shaking" : ""} style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
          <div style={{ width:108, height:60, position:"relative", zIndex:5, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
            {Array.from({ length: n }).map((_, i) => {
              const ratio = n > 1 ? i / (n - 1) : 0.5;
              const spread = (ratio - 0.5) * 74;
              const h = 38 + Math.sin(i * 2.1 + 0.4) * 14;
              return (
                <div key={i} style={{
                  position:"absolute", bottom:0, left:"50%",
                  width: n > 13 ? 4 : 5, height: h,
                  background:"linear-gradient(180deg,#F5E0A8 0%,#DDA860 50%,#C07830 100%)",
                  borderRadius:"3px 3px 0 0",
                  transform:`translateX(calc(-50% + ${spread}px)) rotate(${spread * 0.27}deg)`,
                  transformOrigin:"bottom center",
                  boxShadow:"1px 0 3px rgba(0,0,0,.35)",
                }} />
              );
            })}
          </div>
          <div style={{
            width:132, height:20, zIndex:6, marginTop:-2,
            background:"linear-gradient(180deg,#ECC848 0%,#D4AF37 42%,#A07010 100%)",
            borderRadius:"50%",
            boxShadow:"0 3px 14px rgba(0,0,0,.65), inset 0 1px 3px rgba(255,255,255,.4)",
          }} />
          <div style={{
            width:120, height:178, marginTop:-2, zIndex:4,
            background:"linear-gradient(90deg,#240000 0%,#560000 8%,#8B1520 28%,#C41E3A 50%,#8B1520 72%,#4A0000 92%,#1C0000 100%)",
            position:"relative", overflow:"hidden",
            boxShadow:"inset 0 0 40px rgba(0,0,0,.5), 5px 0 12px rgba(0,0,0,.35)",
          }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"rgba(212,175,55,.48)" }} />
            <div style={{ position:"absolute", bottom:0, left:0, right:0, height:2, background:"rgba(212,175,55,.48)" }} />
            <div style={{ position:"absolute", inset:10, border:"1px solid rgba(212,175,55,.18)" }} />
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12, userSelect:"none" }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width:28, height:1, background:"rgba(212,175,55,.2)" }} />
              ))}
            </div>
            <div style={{ position:"absolute", top:0, bottom:0, left:"50%", width:22, transform:"translateX(-50%)", background:"linear-gradient(90deg,transparent,rgba(255,255,255,.055),transparent)" }} />
          </div>
          <div style={{
            width:146, height:22, marginTop:-2, zIndex:3,
            background:"linear-gradient(90deg,#806010,#D4AF37,#ECC848,#D4AF37,#806010)",
            borderRadius:"0 0 10px 10px",
            boxShadow:"0 8px 26px rgba(0,0,0,.7)",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <span style={{ fontSize:11, fontWeight:900, color:"#3D0000", letterSpacing:4 }}>✦ ✦ ✦ ✦ ✦</span>
          </div>
          <div style={{
            width:162, height:8,
            background:"linear-gradient(90deg,#604010,#9A7020,#604010)",
            borderRadius:"0 0 5px 5px",
            boxShadow:"0 4px 8px rgba(0,0,0,.4)",
          }} />
        </div>
      );
    }

    function ResultStick({ value, animKey }) {
      const len = value ? value.length : 0;
      const fs  = len <= 3 ? 28 : len <= 6 ? 22 : len <= 10 ? 17 : 13;
      return (
        <div key={animKey} className="stick-out" style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{
            width:252, height:60,
            background:"linear-gradient(180deg,#EDD890 0%,#F8ECA5 18%,#E2C46A 40%,#F0DC95 55%,#D4AC54 75%,#C09038 90%,#B07825 100%)",
            borderRadius:6, position:"relative",
            boxShadow:"0 8px 28px rgba(0,0,0,.7), inset 0 2px 5px rgba(255,255,255,.42), inset 0 -1px 3px rgba(0,0,0,.22)",
            display:"flex", alignItems:"center", justifyContent:"center",
            overflow:"hidden",
          }}>
            {[10, 22, 38, 50].map(y => (
              <div key={y} style={{ position:"absolute", top:y, left:0, right:0, height:1, background:`rgba(110,60,10,${y > 30 ? .07 : .15})` }} />
            ))}
            <div style={{ position:"absolute", left:0, top:0, bottom:0, width:11, background:"rgba(70,30,0,.52)", borderRadius:"6px 0 0 6px" }} />
            <div style={{ position:"absolute", right:0, top:0, bottom:0, width:11, background:"rgba(70,30,0,.44)", borderRadius:"0 6px 6px 0" }} />
            <div style={{ position:"absolute", left:18, width:32, height:32, borderRadius:"50%", border:"2px solid rgba(155,15,15,.55)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:"rgba(155,15,15,.48)" }} />
            </div>
            <div style={{ position:"absolute", left:58, top:8, bottom:8, width:1, background:"rgba(110,60,10,.22)" }} />
            <div style={{ position:"absolute", right:22, top:8, bottom:8, width:1, background:"rgba(110,60,10,.18)" }} />
            <div style={{ fontSize:fs, fontWeight:900, color:"#2A0E00", letterSpacing: fs > 20 ? 4 : 2, textShadow:"0 1px 2px rgba(255,255,255,.32)", userSelect:"none", textAlign:"center", maxWidth:160, lineHeight:1.2, overflow:"hidden" }}>
              {value}
            </div>
          </div>
        </div>
      );
    }

    function FortuneSticksApp() {
      const [mode, setMode]           = useState("number");
      const [minNum, setMinNum]       = useState(1);
      const [maxNum, setMaxNum]       = useState(50);
      const [namesList, setNamesList] = useState([]);
      const [nameInput, setNameInput] = useState("");
      const [pool, setPool]           = useState(null);
      const [lastDrawn, setLastDrawn] = useState(null);
      const [history, setHistory]     = useState([]);
      const [phase, setPhase]         = useState("idle");
      const [showHistory, setShowHistory] = useState(false);
      const [animKey, setAnimKey]     = useState(0);
      const roundRef = useRef(0);

      const buildPool = useCallback((m = mode) => {
        if (m === "number") {
          const lo = Math.min(minNum, maxNum), hi = Math.max(minNum, maxNum);
          return Array.from({ length: Math.max(0, hi - lo + 1) }, (_, i) => String(lo + i));
        }
        return [...namesList];
      }, [mode, minNum, maxNum, namesList]);

      const executeDraw = (drawPool) => {
        if (!drawPool || drawPool.length === 0) { setPhase("empty"); return; }
        setPhase("shaking");
        setLastDrawn(null);
        setTimeout(() => {
          const idx   = Math.floor(Math.random() * drawPool.length);
          const drawn = drawPool[idx];
          roundRef.current += 1;
          setLastDrawn(drawn);
          setAnimKey(k => k + 1);
          setHistory(h => [{
            value: drawn,
            round: roundRef.current,
            time: new Date().toLocaleTimeString("th-TH", { hour:"2-digit", minute:"2-digit", second:"2-digit" }),
          }, ...h]);
          setPhase("result");
        }, 1100);
      };

      const handleFirstDraw = () => {
        const p = buildPool();
        setPool(p);
        executeDraw(p);
      };

      const handleContinue = () => {
        const cur = pool !== null ? pool : buildPool();
        const idx = cur.indexOf(lastDrawn);
        const next = [...cur];
        if (idx !== -1) next.splice(idx, 1);
        setPool(next);
        setLastDrawn(null);
        executeDraw(next);
      };

      const handleResetToIdle = () => {
        setPool(null);
        setLastDrawn(null);
        setPhase("idle");
      };

      const addName = () => {
        const parts = nameInput.split(/[,\n、，]/).map(s => s.trim()).filter(Boolean);
        if (!parts.length) return;
        setNamesList(n => [...n, ...parts]);
        setNameInput("");
        setPool(null);
      };

      const removeName = (i) => { setNamesList(n => n.filter((_, j) => j !== i)); setPool(null); };
      const switchMode = (m) => { setMode(m); setPool(null); setLastDrawn(null); setPhase("idle"); };

      const currentPool   = pool !== null ? pool : buildPool();
      const sticksVisible = currentPool.length - (phase === "result" ? 1 : 0);
      const canInitDraw   = mode === "number" ? maxNum >= minNum : namesList.length > 0;
      const totalCount    = buildPool().length;
      const panelBg       = "rgba(90,8,8,.18)";
      const panelBdr      = "1px solid rgba(212,175,55,.22)";

      return (
        <>
          <style>{CSS}</style>
          <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#160000 0%,#220303 55%,#160000 100%)", color:"#FFE4B5", fontFamily:'"Palatino Linotype",Palatino,"Book Antiqua","Times New Roman",Georgia,serif', padding:"20px 16px 52px", maxWidth:500, margin:"0 auto" }}>

            <header style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ fontSize:11, letterSpacing:10, color:"rgba(212,175,55,.48)" }}>✦ ✦ ✦ ✦ ✦</div>
              <h1 className="gold-glow" style={{ fontSize:34, fontWeight:900, color:"#D4AF37", letterSpacing:6, margin:"8px 0 4px" }}>เสี่ยงเซียมซี</h1>
              <p style={{ fontSize:13, color:"rgba(255,228,181,.52)", letterSpacing:4 }}>เสี่ยงเซียมซีสุ่มรางวัล</p>
              <div style={{ fontSize:11, letterSpacing:10, color:"rgba(212,175,55,.48)", marginTop:6 }}>✦ ✦ ✦ ✦ ✦</div>
            </header>

            <div style={{ display:"flex", justifyContent:"center", marginBottom:18 }}>
              <div style={{ border:"1px solid rgba(212,175,55,.34)", borderRadius:10, overflow:"hidden", display:"inline-flex" }}>
                <button className={`tab-btn ${mode==="number"?"on":""}`} onClick={() => switchMode("number")} style={{ borderRight:"1px solid rgba(212,175,55,.24)" }}>🔢 ตัวเลข</button>
                <button className={`tab-btn ${mode==="name"?"on":""}`} onClick={() => switchMode("name")}>📋 รายชื่อ</button>
              </div>
            </div>

            <div style={{ background:panelBg, border:panelBdr, borderRadius:12, padding:"16px 18px", marginBottom:22 }}>
              {mode === "number" ? (
                <>
                  <div style={{ fontSize:12, color:"#D4AF37", letterSpacing:2, marginBottom:12 }}>▸ กำหนดช่วงตัวเลข</div>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:"rgba(212,175,55,.52)", marginBottom:5 }}>ตั้งแต่</div>
                      <input className="inp" type="number" value={minNum} onChange={e => { setMinNum(Number(e.target.value)); setPool(null); }} />
                    </div>
                    <div style={{ color:"#D4AF37", fontSize:22, marginTop:16 }}>—</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:"rgba(212,175,55,.52)", marginBottom:5 }}>ถึง</div>
                      <input className="inp" type="number" value={maxNum} onChange={e => { setMaxNum(Number(e.target.value)); setPool(null); }} />
                    </div>
                  </div>
                  <div style={{ fontSize:12, color:"rgba(255,228,181,.35)", marginTop:9 }}>รวม {Math.max(0, maxNum - minNum + 1)} ตัวเลข</div>
                </>
              ) : (
                <>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                    <div style={{ fontSize:12, color:"#D4AF37", letterSpacing:2 }}>▸ รายชื่อผู้เข้าร่วม ({namesList.length} คน)</div>
                    {namesList.length > 0 && (
                      <button className="btn-mini" onClick={() => { setNamesList([]); setPool(null); }} style={{ borderColor:"rgba(200,65,45,.38)", color:"rgba(210,95,75,.82)" }}>ลบทั้งหมด</button>
                    )}
                  </div>
                  <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <input className="inp" type="text" value={nameInput} placeholder="ชื่อ (หลายชื่อคั่นด้วย ,)" onChange={e => setNameInput(e.target.value)} onKeyDown={e => e.key === "Enter" && addName()} />
                    <button className="btn-sub" onClick={addName} style={{ padding:"9px 14px", fontSize:13, whiteSpace:"nowrap", letterSpacing:0 }}>+ เพิ่ม</button>
                  </div>
                  {namesList.length > 0 ? (
                    <div style={{ maxHeight:118, overflowY:"auto", padding:"2px 0" }}>
                      {namesList.map((name, i) => (
                        <span key={i} className="chip">{name}<button className="chip-x" onClick={() => removeName(i)}>×</button></span>
                      ))}
                    </div>
                  ) : (
                    <div style={{ textAlign:"center", padding:"10px 0", fontSize:13, color:"rgba(255,228,181,.28)" }}>ยังไม่มีรายชื่อ กรุณาเพิ่มก่อนสุ่ม</div>
                  )}
                </>
              )}
            </div>

            <div style={{ position:"relative", height:318, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:14 }}>
              <div className={`cyl-wrap${phase === "result" ? " blurred" : ""}`} style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", zIndex:1 }}>
                <CiamSiContainer isShaking={phase === "shaking"} stickCount={sticksVisible} />
              </div>
              {phase === "result" && lastDrawn && (
                <div style={{ position:"absolute", inset:0, zIndex:10, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10 }}>
                  <ResultStick value={lastDrawn} animKey={animKey} />
                  <div className="res-reveal" style={{ textAlign:"center" }}>
                    <div style={{ fontSize:10, color:"rgba(212,175,55,.65)", letterSpacing:3, marginBottom:4 }}>✦ ผลการเสี่ยงเซียมซี ✦</div>
                    <div style={{ fontSize:36, fontWeight:900, color:"#FFD700", textShadow:"0 0 26px rgba(212,175,55,.65)", letterSpacing:4 }}>{lastDrawn}</div>
                  </div>
                </div>
              )}
              {phase === "shaking" && (
                <div className="wait-dot" style={{ position:"absolute", bottom:0, left:0, right:0, textAlign:"center", fontSize:14, color:"#D4AF37", letterSpacing:4, zIndex:10 }}>
                  กำลังเสี่ยงทาย . . .
                </div>
              )}
              {phase === "empty" && (
                <div className="float-in" style={{ position:"absolute", inset:0, zIndex:10, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"rgba(22,0,0,.75)", borderRadius:12, color:"rgba(255,228,181,.7)" }}>
                  <div style={{ fontSize:36, marginBottom:8 }}>🏮</div>
                  <div style={{ fontSize:15, color:"#D4AF37", marginBottom:4 }}>สุ่มครบทุกรายการแล้ว!</div>
                  <div style={{ fontSize:12 }}>กด "สุ่มใหม่" เพื่อเริ่มต้นใหม่</div>
                </div>
              )}
            </div>

            <div style={{ textAlign:"center", marginBottom:16, fontSize:12, color:"rgba(212,175,55,.5)", letterSpacing:1 }}>
              {phase === "result" ? `เหลือ ${sticksVisible} รายการ จาก ${totalCount}` : phase === "empty" ? "สุ่มครบแล้ว" : pool !== null ? `สุ่มได้อีก ${currentPool.length} รายการ จาก ${totalCount}` : canInitDraw ? `พร้อมสุ่ม ${totalCount} รายการ` : "—"}
            </div>

            <div style={{ display:"flex", justifyContent:"center", gap:12, marginBottom:28, flexWrap:"wrap" }}>
              {phase === "idle" && (
                <button className="btn-main" onClick={handleFirstDraw} disabled={!canInitDraw}>⊙ เสี่ยงเซียมซี</button>
              )}
              {phase === "shaking" && (
                <button className="btn-main" disabled>⊙ กำลังสุ่ม...</button>
              )}
              {phase === "result" && (
                <>
                  <button className="btn-main" onClick={handleContinue} disabled={sticksVisible === 0}>
                    ➤ สุ่มต่อไป {sticksVisible > 0 ? `(เหลือ ${sticksVisible})` : "(หมดแล้ว)"}
                  </button>
                  <button className="btn-sub" onClick={handleResetToIdle}>↺ สุ่มใหม่ทั้งหมด</button>
                </>
              )}
              {phase === "empty" && (
                <button className="btn-main" onClick={handleResetToIdle}>↺ สุ่มใหม่ทั้งหมด</button>
              )}
            </div>

            <div style={{ background:"rgba(0,0,0,.22)", border:"1px solid rgba(212,175,55,.17)", borderRadius:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom: showHistory && history.length > 0 ? "1px solid rgba(212,175,55,.11)" : "none" }}>
                <div style={{ fontSize:13, color:"#D4AF37", letterSpacing:1 }}>📜 ประวัติการสุ่ม ({history.length} ครั้ง)</div>
                <div style={{ display:"flex", gap:8 }}>
                  {history.length > 0 && (
                    <>
                      <button className="btn-mini" onClick={() => setShowHistory(s => !s)}>{showHistory ? "ซ่อน" : "แสดง"}</button>
                      <button className="btn-mini" onClick={() => setHistory([])} style={{ borderColor:"rgba(200,65,45,.38)", color:"rgba(210,95,75,.82)" }}>ล้างทั้งหมด</button>
                    </>
                  )}
                </div>
              </div>
              {showHistory && history.length > 0 && (
                <div style={{ maxHeight:250, overflowY:"auto", padding:"6px 0" }}>
                  {history.map((item, i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 16px", borderBottom:"1px solid rgba(212,175,55,.06)" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                        <span style={{ fontSize:11, color:"rgba(255,228,181,.3)", minWidth:28, textAlign:"right" }}>#{item.round}</span>
                        <span style={{ fontSize:16, fontWeight:700, color:"#FFD700", letterSpacing:1 }}>{item.value}</span>
                      </div>
                      <span style={{ fontSize:11, color:"rgba(255,228,181,.3)" }}>{item.time}</span>
                    </div>
                  ))}
                </div>
              )}
              {history.length === 0 && (
                <div style={{ padding:"16px", textAlign:"center", fontSize:13, color:"rgba(255,228,181,.22)" }}>ยังไม่มีประวัติ</div>
              )}
            </div>

          <div style={{ textAlign:"center", marginTop:28, paddingBottom:4, fontSize:11, color:"rgba(255,228,181,.18)", letterSpacing:1, lineHeight:1.8 }}>
            Copyright © 2026 by KANOKPALM [Made by Claude]
          </div>

          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<FortuneSticksApp />);
  </script>
</body>
</html>
